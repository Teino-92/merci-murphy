<div style="max-width: 640px; margin: 0 auto; font-family: 'Inter', sans-serif; padding: 16px;">
  <p style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Mon Compte — Question 2</p>
  <h2 style="font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px;">Multiple dogs — how should it work?</h2>
  <p style="font-size: 15px; color: #666; margin-bottom: 32px;">Right now the system stores one dog per account. Many owners have two.</p>

  <div style="display: flex; flex-direction: column; gap: 14px;">

    <button onclick="select(this, 'A')" style="text-align:left; padding: 20px 24px; border-radius: 14px; border: 2px solid #e5e0d8; background: #fff; cursor: pointer;">
      <div style="font-weight: 700; font-size: 16px; color: #1a1a1a; margin-bottom: 4px;">A — Multiple dogs, full profiles</div>
      <div style="font-size: 14px; color: #666;">Each dog gets its own card with name, breed, age, weight, coat. Users can add, edit, remove dogs. Visits are linked to a specific dog.</div>
    </button>

    <button onclick="select(this, 'B')" style="text-align:left; padding: 20px 24px; border-radius: 14px; border: 2px solid #e5e0d8; background: #fff; cursor: pointer;">
      <div style="font-weight: 700; font-size: 16px; color: #1a1a1a; margin-bottom: 4px;">B — Keep it simple — one dog per account</div>
      <div style="font-size: 14px; color: #666;">Most clients come with one dog. Keep the model simple for V1, add multi-dog later.</div>
    </button>

  </div>
</div>

<script>
function select(el, val) {
  document.querySelectorAll('button').forEach(b => {
    b.style.border = '2px solid #e5e0d8';
    b.style.background = '#fff';
  });
  el.style.border = '2px solid #C4845A';
  el.style.background = '#fdf8f4';
  if (window.__companion_select) window.__companion_select(val);
}
</script>
