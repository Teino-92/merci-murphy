<div style="max-width: 640px; margin: 0 auto; font-family: 'Inter', sans-serif; padding: 16px;">
  <p style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Mon Compte — Question 1</p>
  <h2 style="font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px;">What's the main purpose of the account page?</h2>
  <p style="font-size: 15px; color: #666; margin-bottom: 32px;">Pick the option that best matches your vision. This shapes what we build first.</p>

  <div style="display: flex; flex-direction: column; gap: 14px;">

    <button onclick="select(this, 'A')" style="text-align:left; padding: 20px 24px; border-radius: 14px; border: 2px solid #e5e0d8; background: #fff; cursor: pointer; transition: all 0.15s;">
      <div style="font-weight: 700; font-size: 16px; color: #1a1a1a; margin-bottom: 4px;">A — Profile hub</div>
      <div style="font-size: 14px; color: #666;">Users manage their info and their dog(s). Mainly useful before a visit — filling in breed, weight, coat so the groomer has everything ready.</div>
    </button>

    <button onclick="select(this, 'B')" style="text-align:left; padding: 20px 24px; border-radius: 14px; border: 2px solid #e5e0d8; background: #fff; cursor: pointer; transition: all 0.15s;">
      <div style="font-weight: 700; font-size: 16px; color: #1a1a1a; margin-bottom: 4px;">B — Loyalty card</div>
      <div style="font-size: 14px; color: #666;">The account feels like a membership. Users see their visit history, next appointment, and feel a sense of belonging to the merci murphy® community.</div>
    </button>

    <button onclick="select(this, 'C')" style="text-align:left; padding: 20px 24px; border-radius: 14px; border: 2px solid #e5e0d8; background: #fff; cursor: pointer; transition: all 0.15s;">
      <div style="font-weight: 700; font-size: 16px; color: #1a1a1a; margin-bottom: 4px;">C — Both, equally</div>
      <div style="font-size: 14px; color: #666;">Profile management + visit history + community feel. A full owner space.</div>
    </button>

  </div>
</div>

<script>
function select(el, val) {
  document.querySelectorAll('button').forEach(b => {
    b.style.border = '2px solid #e5e0d8';
    b.style.background = '#fff';
  });
  el.style.border = '2px solid #C4845A';
  el.style.background = '#fdf8f4';
  if (window.__companion_select) window.__companion_select(val);
}
</script>
